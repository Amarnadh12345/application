<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Service UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Multi-Service Application UI</h1>
        
        <ul class="nav nav-tabs" id="mainTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="insert-tab" data-bs-toggle="tab" data-bs-target="#insert" type="button" role="tab" aria-controls="insert" aria-selected="true">Insert</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="fetch-tab" data-bs-toggle="tab" data-bs-target="#fetch" type="button" role="tab" aria-controls="fetch" aria-selected="false">Fetch</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="chain-tab" data-bs-toggle="tab" data-bs-target="#chain" type="button" role="tab" aria-controls="chain" aria-selected="false">Fetch Chain</button>
            </li>
        </ul>
        <div class="tab-content mt-3" id="mainTabContent">
            <div class="tab-pane fade show active" id="insert" role="tabpanel" aria-labelledby="insert-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h5>Insert to API 1</h5>
                            </div>
                            <div class="card-body">
                                <input type="text" id="insert1Input" class="form-control mb-3" placeholder="Enter data for API 1">
                                <button id="insert1Btn" class="btn btn-primary w-100">Insert to API 1</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-secondary text-white">
                                <h5>Insert to API 2</h5>
                            </div>
                            <div class="card-body">
                                <input type="text" id="insert2Input" class="form-control mb-3" placeholder="Enter data for API 2">
                                <button id="insert2Btn" class="btn btn-secondary w-100">Insert to API 2</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="fetch" role="tabpanel" aria-labelledby="fetch-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h5>Fetch from API 1</h5>
                            </div>
                            <div class="card-body">
                                <button id="fetch1Btn" class="btn btn-success w-100 mb-3">Fetch API 1</button>
                                <div id="fetch1Display" class="border p-3 bg-light" style="min-height: 200px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-warning text-dark">
                                <h5>Fetch from API 2</h5>
                            </div>
                            <div class="card-body">
                                <button id="fetch2Btn" class="btn btn-warning w-100 mb-3">Fetch API 2</button>
                                <div id="fetch2Display" class="border p-3 bg-light" style="min-height: 200px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="chain" role="tabpanel" aria-labelledby="chain-tab">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5>Fetch API 1 (which calls API 2)</h5>
                    </div>
                    <div class="card-body">
                        <button id="callBtn" class="btn btn-info w-100">Fetch Chain</button>
                        <pre id="result" class="mt-3 bg-light p-3 border"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
